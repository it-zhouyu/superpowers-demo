server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: Y2xhdWRlLWNvZGUtYXV0aC1kZW1vLXNlY3JldC1rZXktMjAyNi0wNi0xMw==
  expiration: 7200000
